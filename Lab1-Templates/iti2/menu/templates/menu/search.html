<!DOCTYPE html>
<html>
<head>
    <title>KFC's Kitchen</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h1>KFC's Kitchen</h1>

    <form method="GET" action="">
        <input type="text" name="search" placeholder="m" value="{{ last_search }}">
        
        <select name="category">
            <option value="All">All Categories</option>
            <option value="Main" {% if last_category == "Main" %}selected{% endif %}>Main</option>
            <option value="Drinks" {% if last_category == "Drinks" %}selected{% endif %}>Drinks</option>
            <option value="Dessert" {% if last_category == "Dessert" %}selected{% endif %}>Dessert</option>
        </select>
        
        <button type="submit">Search</button>
    </form>

    <br>

    {% for item in items %}
        <div style="background-color: #f9f9f9; border: 1px solid #eee; padding: 20px; width: 300px; border-radius: 8px;">
            <h2 style="margin-top: 0;">{{ item.name }}</h2>
            <p>Category: {{ item.category }}</p>
            <p>Price: {{ item.price }} EGP</p>
            <p>Available: {% if item.available %}✅{% else %}❌{% endif %}</p>
        </div>
    {% empty %}
        <p>No items found.</p>
    {% endfor %}

</body>
</html>
